<!DOCTYPE html>
<html>
<head>
    <title>Roblox Radar</title>

    <style>
        body{
            margin:0;
            background:#2f5f8f;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
            color:white;
        }

        #radar{
            width:700px;
            height:700px;
            background:#345f86;
            border-radius:15px;
            position:relative;
            overflow:hidden;
            border:3px solid #6da9ff;
        }

        #title{
            position:absolute;
            top:15px;
            left:20px;
            font-size:28px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div id="radar">
    <div id="title">
        Roblox Radar
    </div>
</div>

</body>
</html>
